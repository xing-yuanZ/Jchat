<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的Supabase聊天室</title>
    <!-- 引入 Supabase JS SDK v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #e5e7eb;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .chat-container {
            max-width: 700px;
            width: 100%;
            height: 90vh;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #1e293b;
            color: white;
            padding: 18px 20px;
            font-weight: 600;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: -0.2px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f9fafb;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            align-self: flex-start;
            word-wrap: break-word;
        }
        .message-meta {
            font-size: 0.7rem;
            font-weight: 600;
            color: #3b82f6;
            margin-bottom: 4px;
        }
        .message-text {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #1f2937;
        }
        .input-area {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 12px 16px 18px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .input-group {
            flex: 1;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        input {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
            background: #fff;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }
        #nicknameInput {
            width: 110px;
        }
        #messageInput {
            flex: 1;
            min-width: 160px;
        }
        button {
            background: #1e293b;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        button:hover {
            background: #0f172a;
        }
        .error-tip {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
            border-radius: 20px;
            margin: 8px 16px;
        }
        @media (max-width: 500px) {
            .input-area { flex-direction: column; align-items: stretch; }
            .input-group { flex-wrap: nowrap; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        💬 实时聊天室 · Supabase
    </div>
    <div class="messages-area" id="messages">
        <!-- 动态消息会显示在这里 -->
        <div style="text-align:center; color:#9ca3af; padding:20px;">加载历史消息中...</div>
    </div>
    <div class="input-area">
        <div class="input-group">
            <input type="text" id="nicknameInput" placeholder="昵称" value="小朋友" maxlength="20">
            <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
        </div>
        <button id="sendBtn">发送</button>
    </div>
</div>

<script>
    // ---------- 🔥 用你自己的真实信息替换下面两行 ----------
    const SUPABASE_URL = 'https://cxilodvbdhtxtrldoswl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_36lHK24HL6drOmuhSTTv8g_w2n0fU5H';
    // -----------------------------------------------------

    // 初始化 Supabase 客户端
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const messagesDiv = document.getElementById('messages');
    const nicknameInput = document.getElementById('nicknameInput');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // 防XSS攻击
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 显示单条消息
    function displayMessage(msg) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message';
        msgDiv.innerHTML = `
            <div class="message-meta">${escapeHtml(msg.user_name)}</div>
            <div class="message-text">${escapeHtml(msg.content)}</div>
        `;
        messagesDiv.appendChild(msgDiv);
        // 自动滚动到底部
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // 加载历史消息（按时间升序）
    async function loadHistory() {
        const { data, error } = await supabase
            .from('messages')
            .select('*')
            .order('created_at', { ascending: true });

        if (error) {
            console.error('加载失败:', error);
            messagesDiv.innerHTML = `<div class="error-tip">⚠️ 加载聊天记录失败！请确保已在 Supabase SQL 编辑器中运行了建表语句。<br>错误: ${error.message}</div>`;
            return;
        }
        if (data && data.length > 0) {
            messagesDiv.innerHTML = ''; // 清空加载提示
            data.forEach(msg => displayMessage(msg));
        } else {
            messagesDiv.innerHTML = '<div style="text-align:center; color:#9ca3af; padding:20px;">✨ 暂无消息，发一条吧～</div>';
        }
    }

    // 发送消息
    async function sendMessage() {
        const userName = nicknameInput.value.trim();
        const content = messageInput.value.trim();

        if (!userName) {
            alert('请填写昵称');
            return;
        }
        if (!content) {
            alert('请输入消息内容');
            return;
        }

        // 插入新消息
        const { error } = await supabase
            .from('messages')
            .insert([{ user_name: userName, content: content }]);

        if (error) {
            alert('发送失败: ' + error.message);
            console.error(error);
        } else {
            messageInput.value = '';   // 清空输入框
            messageInput.focus();
        }
    }

    // 实时订阅新消息
    const channel = supabase
        .channel('public:messages')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            // 收到新消息实时显示
            displayMessage(payload.new);
        })
        .subscribe();

    // 绑定事件
    sendBtn.onclick = sendMessage;
    messageInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    // 启动页面：加载历史消息
    loadHistory();
</script>
</body>
</html>
