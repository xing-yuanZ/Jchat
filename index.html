<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jchat - 微信版 (完美兼容旧数据)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --wechat-green: #07c160; --wechat-bg: #f3f3f3; --sidebar-bg: #2e2e2e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--wechat-bg); display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app-container { display: flex; width: 1000px; height: 700px; background: white; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); overflow: hidden; }
        .sidebar { width: 60px; background: var(--sidebar-bg); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; }
        .sidebar button { background: none; border: none; color: #999; cursor: pointer; padding: 10px; font-size: 14px; width: 100%; }
        .sidebar button.active, .sidebar button:hover { color: var(--wechat-green); }
        .sidebar .logout-btn { margin-top: auto; margin-bottom: 20px; color: #ff4d4f; }
        .main-panel { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; }
        .view-section { display: none; width: 100%; height: 100%; flex-direction: column; }
        .view-section.active { display: flex; }
        .panel-header { height: 60px; border-bottom: 1px solid #eee; display: flex; align-items: center; padding: 0 20px; font-size: 18px; background: #f8f8f8; }
        .chat-box { flex: 1; display: flex; flex-direction: column; background: #f5f5f5; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 14px; border-radius: 4px; background: white; font-size: 14px; align-self: flex-start; }
        .msg.me { background: #95ec69; align-self: flex-end; }
        .chat-input-area { height: 140px; border-top: 1px solid #e5e5e5; display: flex; flex-direction: column; }
        .chat-input-area textarea { flex: 1; border: none; padding: 15px; resize: none; outline: none; }
        .chat-input-area .btn-row { display: flex; justify-content: flex-end; padding: 10px 20px; }
        .btn { background: var(--wechat-green); color: white; border: none; padding: 7px 18px; border-radius: 4px; cursor: pointer; }
        .list-container { flex: 1; padding: 20px; overflow-y: auto; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; background: #fafafa; margin-bottom: 10px; }
        .announcement-card { background: #fffbe6; border: 1px solid #ffe58f; padding: 15px; border-radius: 4px; margin-bottom: 15px; }
        .form-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .form-control { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .auth-card { background: white; padding: 40px; border-radius: 8px; width: 350px; text-align: center; }
        .auth-card .form-group { flex-direction: column; }
        .auth-toggle { margin-top: 15px; font-size: 12px; color: #666; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title">登录 Jchat</h2>
            <div class="form-group">
                <input type="text" id="auth-username" class="form-control" placeholder="请输入用户名" required>
                <input type="password" id="auth-password" class="form-control" placeholder="请输入密码" required>
                <button class="btn" id="auth-submit-btn" onclick="handleAuth()">登录</button>
            </div>
            <div class="auth-toggle" onclick="toggleAuthMode()">没有账号？立即注册</div>
        </div>
    </div>

    <div id="app-container">
        <div class="sidebar">
            <button class="nav-btn active" onclick="switchView('chat')">微信</button>
            <button class="nav-btn" onclick="switchView('friends')">通讯录</button>
            <button class="nav-btn" onclick="switchView('notice')">公告</button>
            <button class="nav-btn" id="admin-nav" style="display: none;" onclick="switchView('admin')">管理</button>
            <button class="logout-btn" onclick="handleLogout()">退出</button>
        </div>

        <div class="main-panel">
            <div id="view-chat" class="view-section active">
                <div class="panel-header" id="chat-title">大厅聊天室</div>
                <div class="chat-box">
                    <div class="chat-messages" id="chat-messages"></div>
                    <div class="chat-input-area">
                        <textarea id="chat-textarea" placeholder="请输入消息..."></textarea>
                        <div class="btn-row"><button class="btn" onclick="sendChatMessage()">发送(S)</button></div>
                    </div>
                </div>
            </div>

            <div id="view-friends" class="view-section">
                <div class="panel-header">通讯录</div>
                <div class="list-container">
                    <div class="form-group">
                        <input type="text" id="friend-username" class="form-control" placeholder="输入好友的用户名">
                        <button class="btn" onclick="addFriend()">添加好友</button>
                    </div>
                    <h3>我的好友列表</h3>
                    <div id="friends-list" style="margin-top: 10px;"></div>
                </div>
            </div>

            <div id="view-notice" class="view-section">
                <div class="panel-header">系统公告</div>
                <div class="list-container">
                    <div id="admin-notice-input" class="form-group" style="display: none;">
                        <input type="text" id="notice-content" class="form-control" placeholder="发布新公告...">
                        <button class="btn" onclick="publishNotice()">发布</button>
                    </div>
                    <div id="notice-list"></div>
                </div>
            </div>

            <div id="view-admin" class="view-section">
                <div class="panel-header">Admin 后台管理系统</div>
                <div class="list-container">
                    <h3 style="margin-bottom: 15px;">用户列表与权限管理</h3>
                    <div id="admin-user-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://cxilodvbdhtxtrldoswl.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_36lHK24HL6drOmuhSTTv8g_w2n0fU5H";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentDisplayUsername = ""; 
        let isSignUpMode = false;
        let userProfile = { role: 'user', is_muted: false };

        // 统一把输入的用户名/旧数据转为展示格式的辅助函数
        function cleanName(rawString) {
            if (!rawString) return "未知用户";
            // 如果带 @jchat.com 后缀或者带旧的邮箱后缀，通通切掉，只展示前缀
            return rawString.split('@')[0];
        }

        async function checkExistingSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                currentDisplayUsername = cleanName(currentUser.email);
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('chat-title').innerText = `大厅聊天室 (当前用户: ${currentDisplayUsername})`;
                await checkUserRoleAndStatus();
                loadMessages();
                listenToNewMessages();
            }
        }
        window.onload = checkExistingSession;

        function switchView(viewName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            event.currentTarget.classList.add('active');

            if (viewName === 'chat') loadMessages();
            if (viewName === 'friends') loadFriends();
            if (viewName === 'notice') loadNotices();
            if (viewName === 'admin') loadAdminUserList();
        }

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-title').innerText = isSignUpMode ? "注册 Jchat 账号" : "登录 Jchat";
            document.getElementById('auth-submit-btn').innerText = isSignUpMode ? "注册并登录" : "登录";
            document.querySelector('.auth-toggle').innerText = isSignUpMode ? "没有账号？返回登录" : "没有账号？立即注册";
        }

        async function handleAuth() {
            const inputName = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value;
            if(!inputName || !password) return alert('请填写完整信息');
            
            // 💡 核心兼容算法：如果输入的不包含 @，自动补全假邮箱；如果输入的是旧邮箱，直接使用。
            const targetEmail = inputName.includes('@') ? inputName : `${inputName}@jchat.com`;

            let result;
            if (isSignUpMode) {
                result = await supabase.auth.signUp({ email: targetEmail, password });
                if(result.error) return alert('注册失败: ' + result.error.message);
                
                // 💡 写入旧的 profiles 表（继续使用 email 列，确保和你的数据库结构 100% 对应）
                await supabase.from('profiles').insert([{ id: result.data.user.id, email: targetEmail, role: 'user', is_muted: false }]);
                alert('注册成功！');
            } else {
                result = await supabase.auth.signInWithPassword({ email: targetEmail, password });
                if(result.error) return alert('登录失败: 用户名/邮箱或密码错误');
            }

            currentUser = result.data.user;
            currentDisplayUsername = cleanName(currentUser.email);
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('chat-title').innerText = `大厅聊天室 (当前用户: ${currentDisplayUsername})`;
            await checkUserRoleAndStatus();
            loadMessages();
            listenToNewMessages();
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            location.reload();
        }

        async function checkUserRoleAndStatus() {
            if (!currentUser) return;
            // 💡 调用旧的 email 列进行核对
            const { data, error } = await supabase.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
            if (data) {
                userProfile = data;
                if (data.role === 'admin') {
                    document.getElementById('admin-nav').style.display = 'block';
                    document.getElementById('admin-notice-input').style.display = 'flex';
                }
            }
        }

        /* ==================== 功能一：大厅聊天（完美调用旧数据） ==================== */
        async function loadMessages() {
            const { data, error } = await supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            if(data) {
                data.forEach(msg => {
                    const div = document.createElement('div');
                    div.classList.add('msg');
                    if(msg.sender_id === currentUser.id) div.classList.add('me');
                    // 💡 自动对旧聊天记录中的邮箱进行切后缀处理
                    div.textContent = `${cleanName(msg.sender_email)}: ${msg.content}`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            }
        }

        async function sendChatMessage() {
            await checkUserRoleAndStatus();
            if (userProfile.is_muted) return alert('你已被管理员禁言！');

            const textarea = document.getElementById('chat-textarea');
            const content = textarea.value.trim();
            if (!content) return;

            await supabase.from('messages').insert([
                { sender_id: currentUser.id, sender_email: currentUser.email, content: content }
            ]);
            textarea.value = '';
        }

        function listenToNewMessages() {
            supabase.channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                const msg = payload.new;
                const container = document.getElementById('chat-messages');
                const div = document.createElement('div');
                div.classList.add('msg');
                if(msg.sender_id === currentUser.id) div.classList.add('me');
                div.textContent = `${cleanName(msg.sender_email)}: ${msg.content}`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }).subscribe();
        }

        /* ==================== 功能二：通讯录好友（调用旧的 friend_email） ==================== */
        async function loadFriends() {
            // 💡 完美调用旧的字段名 friend_email
            const { data, error } = await supabase.from('friends').select('*').eq('user_id', currentUser.id);
            const container = document.getElementById('friends-list');
            container.innerHTML = data && data.length ? '' : '<p style="color:#999;">暂无好友</p>';
            if (data) {
                data.forEach(f => {
                    container.innerHTML += `<div class="list-item"><span>${cleanName(f.friend_email)}</span><button class="btn" onclick="switchView('chat')">发消息</button></div>`;
                });
            }
        }

        async function addFriend() {
            const inputName = document.getElementById('friend-username').value.trim();
            if(!inputName) return;
            if(inputName === currentDisplayUsername) return alert('不能添加自己为好友');
            
            // 如果输入的不是完整邮箱，自动补全假邮箱，确保能对应数据库旧列
            const targetFriendEmail = inputName.includes('@') ? inputName : `${inputName}@jchat.com`;

            const { error } = await supabase.from('friends').insert([{ user_id: currentUser.id, friend_email: targetFriendEmail }]);
            if (error) alert('添加失败: ' + error.message);
            else { alert('已成功添加到通讯录！'); loadFriends(); }
            document.getElementById('friend-username').value = '';
        }

        /* ==================== 功能三：公告栏 ==================== */
        async function loadNotices() {
            const { data, error } = await supabase.from('notices').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('notice-list');
            container.innerHTML = '';
            if (data) {
                data.forEach(n => {
                    container.innerHTML += `
                        <div class="announcement-card">
                            <strong>📢 系统公告</strong> <small style="color:#999;">${new Date(n.created_at).toLocaleString()}</small>
                            <p style="margin-top:8px; font-size:14px;">${n.content}</p>
                        </div>`;
                });
            }
        }

        rel="stylesheet"
        async function publishNotice() {
            const content = document.getElementById('notice-content').value.trim();
            if(!content) return;
            await supabase.from('notices').insert([{ content, created_by: currentUser.id }]);
            document.getElementById('notice-content').value = '';
            loadNotices();
        }

        /* ==================== 功能四：管理员后台（调用旧数据） ==================== */
        async function loadAdminUserList() {
            if (userProfile.role !== 'admin') return;
            const { data, error } = await supabase.from('profiles').select('*');
            const container = document.getElementById('admin-user-list');
            container.innerHTML = '';
            if (data) {
                data.forEach(u => {
                    if (u.id === currentUser.id) return; 
                    container.innerHTML += `
                        <div class="list-item">
                            <div>
                                <strong>${cleanName(u.email)}</strong> 
                                <span style="font-size:12px; color:${u.is_muted ? 'red' : 'green'};">(${u.is_muted ? '已禁言' : '正常'})</span>
                            </div>
                            <div style="display:flex; gap:10px;">
                                <button class="btn" style="background:#e6a23c;" onclick="toggleMute('${u.id}', ${u.is_muted})">
                                    ${u.is_muted ? '解禁' : '禁言'}
                                </button>
                                <button class="btn btn-danger" onclick="deleteUserAccount('${u.id}')">移除</button>
                            </div>
                        </div>`;
                });
            }
        }

        async function toggleMute(userId, currentMuteStatus) {
            await supabase.from('profiles').update({ is_muted: !currentMuteStatus }).eq('id', userId);
            loadAdminUserList();
        }

        async function deleteUserAccount(userId) {
            if(!confirm("确定要移除该用户的数据吗？")) return;
            await supabase.from('profiles').delete().eq('id', userId);
            loadAdminUserList();
        }
    </script>
</body>
</html>
