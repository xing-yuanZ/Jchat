<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>JChat - 即时通讯</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            color: #111;
            overflow: hidden;
            height: 100vh;
        }

        /* 主题色：蓝色 */
        :root {
            --primary: #007aff;
            --primary-dark: #005fc1;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --bg-body: #f5f7fb;
            --bg-card: white;
            --border: #e5e5e5;
            --text-secondary: #6c6c6c;
        }

        /* 登录页 */
        .login-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #007aff, #5856d6);
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 320px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .login-card h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #111;
        }
        .login-card input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
        }
        .login-card button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .login-card button:active {
            transform: scale(0.98);
        }
        .login-card button:hover {
            background: var(--primary-dark);
        }
        .auth-switch {
            text-align: center;
            margin-top: 16px;
            color: var(--primary);
            cursor: pointer;
        }
        .error-msg {
            color: var(--danger);
            margin-bottom: 12px;
            text-align: center;
        }

        /* 主应用容器 */
        .app {
            height: 100vh;
            background: var(--bg-body);
            position: relative;
            overflow: hidden;
        }

        /* 两个全屏视图：好友列表页、聊天页 */
        .view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease, opacity 0.3s ease;
            background: var(--bg-body);
            overflow-y: auto;
        }
        .view.hidden {
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
        }
        .view.active {
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* 好友列表页样式 */
        .friends-header {
            background: white;
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .friends-header .title {
            font-size: 20px;
            font-weight: 600;
        }
        .menu-btn {
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }
        .friend-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }
        .friend-item:active {
            background: #f0f0f0;
        }
        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            margin-right: 12px;
            position: relative;
        }
        .unread-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ff3b30;
            color: white;
            border-radius: 50%;
            min-width: 18px;
            height: 18px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
        .friend-info {
            flex: 1;
        }
        .friend-name {
            font-weight: 500;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .last-message {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .last-time {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* 聊天页样式 */
        .chat-header {
            background: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .back-btn {
            font-size: 28px;
            cursor: pointer;
            margin-right: 16px;
            width: 32px;
            text-align: center;
        }
        .chat-title {
            flex: 1;
            font-size: 18px;
            font-weight: 600;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f9fc;
            height: calc(100% - 120px);
        }
        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
        }
        .message.sent {
            align-self: flex-end;
        }
        .message.received {
            align-self: flex-start;
        }
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 15px;
            word-wrap: break-word;
            animation: fadeInUp 0.2s ease;
        }
        .message.sent .bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.received .bubble {
            background: white;
            color: #111;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }
        .message-media {
            margin-top: 4px;
        }
        .message-media img, .message-media video {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }
        .chat-input-area {
            background: white;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid var(--border);
            position: sticky;
            bottom: 0;
        }
        .chat-input-area .emoji-btn, .chat-input-area .file-btn {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            padding: 4px;
        }
        .input-wrapper {
            flex: 1;
            background: #f2f2f2;
            border-radius: 20px;
            padding: 8px 12px;
        }
        #chat-input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
        }
        .send-btn {
            background: var(--primary);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .send-btn:active {
            transform: scale(0.96);
        }
        .emoji-picker {
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #ddd;
            padding: 12px;
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 200;
        }
        .emoji-picker.active {
            display: flex;
        }
        .emoji-item {
            font-size: 28px;
            cursor: pointer;
            padding: 4px;
        }

        /* 底部菜单（用于切换到其他页面） */
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            z-index: 100;
        }
        .menu-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #8e8e93;
            cursor: pointer;
            transition: color 0.2s;
        }
        .menu-item.active {
            color: var(--primary);
        }
        .menu-icon {
            font-size: 22px;
        }

        /* 其他页面样式（设置、个人主页、管理） */
        .page {
            padding: 16px;
            background: var(--bg-body);
            min-height: 100%;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .card h3 {
            margin-bottom: 12px;
        }
        button {
            background: var(--primary);
            border: none;
            padding: 10px 16px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        .danger-btn {
            background: var(--danger);
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .table-wrapper {
            max-height: 300px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    (function(){
        // Supabase 配置
        const SUPABASE_URL = 'https://cxilodvbdhtxtrldoswl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_36lHK24HL6drOmuhSTTv8g_w2n0fU5H';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const EMAIL_SUFFIX = '@jchat.local';
        const STORAGE_BUCKET = 'chat_files';

        let currentUser = null;
        let currentProfile = null;
        let currentView = 'friends';   // friends, chat, profile, settings, admin
        let currentChatUser = null;
        let messagesSubscription = null;
        let unreadCounts = new Map();

        // ========== 辅助函数 ==========
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        function getInitial(name) {
            return name ? name.charAt(0).toUpperCase() : '?';
        }

        // 渲染消息内容（文本、图片、视频）
        function renderMessageContent(content) {
            if (!content) return '';
            const urlRegex = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|mp4|webm|mov))/gi;
            let lastIndex = 0;
            const parts = [];
            let match;
            while ((match = urlRegex.exec(content)) !== null) {
                if (match.index > lastIndex) parts.push({ type: 'text', text: content.substring(lastIndex, match.index) });
                const url = match[0];
                const ext = match[2].toLowerCase();
                const isImage = ['jpg','jpeg','png','gif'].includes(ext);
                const isVideo = ['mp4','webm','mov'].includes(ext);
                parts.push({ type: isImage ? 'image' : (isVideo ? 'video' : 'file'), url: url });
                lastIndex = match.index + url.length;
            }
            if (lastIndex < content.length) parts.push({ type: 'text', text: content.substring(lastIndex) });
            if (parts.length === 0) return `<div class="message-content">${escapeHtml(content)}</div>`;
            let html = '<div class="message-content">';
            for (const part of parts) {
                if (part.type === 'text') html += escapeHtml(part.text);
                else if (part.type === 'image') html += `<img src="${escapeHtml(part.url)}" class="message-media" onclick="window.open('${escapeHtml(part.url)}', '_blank')" style="max-width:200px; max-height:200px; border-radius:12px; cursor:pointer;">`;
                else if (part.type === 'video') html += `<video controls class="message-media" style="max-width:200px; max-height:200px; border-radius:12px;" src="${escapeHtml(part.url)}"></video>`;
                else html += `<a href="${escapeHtml(part.url)}" target="_blank">📎 查看文件</a>`;
            }
            html += '</div>';
            return html;
        }

        async function uploadFile(file) {
            if (!file) return null;
            const fileExt = file.name.split('.').pop();
            const fileName = `${currentUser.id}/${Date.now()}_${Math.random().toString(36).substring(2,8)}.${fileExt}`;
            const { data, error } = await _supabase.storage.from(STORAGE_BUCKET).upload(fileName, file);
            if (error) { alert('上传失败: ' + error.message); return null; }
            const { data: { publicUrl } } = _supabase.storage.from(STORAGE_BUCKET).getPublicUrl(fileName);
            return publicUrl;
        }

        // 发送消息（文本或文件）
        async function sendMessageWithFile(file) {
            if (!currentChatUser) return;
            const inputEl = document.getElementById('chat-input');
            let content = inputEl ? inputEl.value.trim() : '';
            if (file) {
                const url = await uploadFile(file);
                if (url) content = content ? content + ' ' + url : url;
                else return;
            }
            if (!content) return;
            if (currentProfile.is_muted) { alert('你已被禁言'); return; }
            const { error } = await _supabase.from('messages').insert({
                from_user_id: currentUser.id,
                to_user_id: currentChatUser.id,
                content: content
            });
            if (error) alert('发送失败: ' + error.message);
            else if (inputEl) inputEl.value = '';
        }

        // ========== 数据库操作 ==========
        async function loadUnreadCounts() {
            const { data, error } = await _supabase.from('unread_messages').select('from_user_id, count').eq('user_id', currentUser.id);
            if (!error && data) {
                unreadCounts.clear();
                data.forEach(item => unreadCounts.set(item.from_user_id, item.count));
            }
        }
        async function clearUnreadForUser(fromUserId) {
            await _supabase.rpc('clear_unread_count', { p_from_user_id: fromUserId });
            unreadCounts.set(fromUserId, 0);
        }
        async function ensureProfile(user, username) {
            await _supabase.from('public_profiles').upsert({
                id: user.id, email: user.email, display_name: username,
                is_admin: false, is_muted: false, bio: '', deleted_at: null
            }, { onConflict: 'id', ignoreDuplicates: true });
        }
        async function fetchCurrentProfile() {
            for (let i = 0; i < 10; i++) {
                const { data, error } = await _supabase.from('public_profiles').select('*').eq('id', currentUser.id).maybeSingle();
                if (data) return data;
                if (i === 0) { const username = currentUser.email ? currentUser.email.replace(EMAIL_SUFFIX, '') : 'user'; await ensureProfile(currentUser, username); }
                await new Promise(r => setTimeout(r, 500));
            }
            throw new Error('无法获取用户资料');
        }
        async function getNotifications() {
            const { data: unreads } = await _supabase.from('unread_messages').select('from_user_id, count').eq('user_id', currentUser.id).gt('count', 0);
            if (!unreads || unreads.length === 0) return [];
            const fromIds = unreads.map(u => u.from_user_id);
            const { data: profiles } = await _supabase.from('public_profiles').select('id, display_name').in('id', fromIds).is('deleted_at', null);
            const map = new Map(); if (profiles) profiles.forEach(p => map.set(p.id, p));
            return unreads.map(u => ({ from_user_id: u.from_user_id, display_name: map.get(u.from_user_id)?.display_name || '未知', count: u.count }));
        }

        // 获取好友列表（用于显示）
        async function getFriendsList() {
            const { data: friendships } = await _supabase.from('friendships').select('user_id, friend_id').or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`).eq('status', 'accepted');
            const friendIds = [];
            if (friendships) friendships.forEach(f => { if (f.user_id === currentUser.id) friendIds.push(f.friend_id); else friendIds.push(f.user_id); });
            if (friendIds.length === 0) return [];
            const { data: friends } = await _supabase.from('public_profiles').select('id, display_name').in('id', friendIds).is('deleted_at', null);
            if (!friends) return [];
            const list = [];
            for (const f of friends) {
                const { data: msgData } = await _supabase.from('messages').select('content, created_at').or(`and(from_user_id.eq.${currentUser.id},to_user_id.eq.${f.id}),and(from_user_id.eq.${f.id},to_user_id.eq.${currentUser.id})`).order('created_at', { ascending: false }).limit(1);
                const lastMsg = (msgData && msgData[0]) ? msgData[0] : null;
                const lastContent = lastMsg ? (lastMsg.content.length > 30 ? lastMsg.content.substring(0,30)+'...' : lastMsg.content) : '';
                const lastTime = lastMsg ? new Date(lastMsg.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
                const unread = unreadCounts.get(f.id) || 0;
                list.push({ id: f.id, name: f.display_name, lastContent, lastTime, unread, lastTimestamp: lastMsg ? new Date(lastMsg.created_at).getTime() : 0 });
            }
            list.sort((a,b) => b.lastTimestamp - a.lastTimestamp);
            return list;
        }

        // 渲染好友列表页
        async function renderFriendsView() {
            const list = await getFriendsList();
            let html = '<div class="friends-header"><div class="title">JChat</div><div class="menu-btn" id="main-menu-btn">⋮</div></div>';
            if (list.length === 0) {
                html += '<div style="padding:40px;text-align:center;color:#888;">暂无好友，去通讯录添加吧</div>';
            } else {
                html += '<div class="friends-list">';
                for (const item of list) {
                    const badge = item.unread > 0 ? `<span class="unread-badge">${item.unread > 99 ? '99+' : item.unread}</span>` : '';
                    html += `<div class="friend-item" data-id="${item.id}" data-name="${escapeHtml(item.name)}">
                        <div class="avatar">${getInitial(item.name)}${badge}</div>
                        <div class="friend-info">
                            <div class="friend-name">${escapeHtml(item.name)}</div>
                            <div class="last-message">${escapeHtml(item.lastContent)}</div>
                        </div>
                        <div class="last-time">${item.lastTime}</div>
                    </div>`;
                }
                html += '</div>';
            }
            // 底部菜单
            html += `<div class="bottom-menu">
                <div class="menu-item ${currentView === 'friends' ? 'active' : ''}" data-view="friends"><div class="menu-icon">💬</div><span>聊天</span></div>
                <div class="menu-item" data-view="contacts"><div class="menu-icon">👥</div><span>通讯录</span></div>
                <div class="menu-item" data-view="profile"><div class="menu-icon">😀</div><span>我</span></div>
            </div>`;
            return html;
        }

        // 通讯录页面（好友申请、添加好友）
        async function renderContactsView() {
            // 好友请求
            const { data: requests } = await _supabase.from('friendships').select('id, user_id').eq('friend_id', currentUser.id).eq('status', 'pending');
            let requestUsers = [];
            if (requests && requests.length) {
                const { data } = await _supabase.from('public_profiles').select('id, display_name').in('id', requests.map(r => r.user_id)).is('deleted_at', null);
                requestUsers = data || [];
            }
            const requestsHtml = requestUsers.map(r => `<div class="friend-item" data-request-id="${requests.find(req => req.user_id === r.id).id}"><span>${escapeHtml(r.display_name)} 请求添加好友</span><div><button class="accept-friend">接受</button><button class="reject-friend" style="background:#aaa;">拒绝</button></div></div>`).join('') || '<div>暂无</div>';
            // 已有好友列表
            const list = await getFriendsList();
            const friendsHtml = list.map(f => `<div class="friend-item" style="justify-content:flex-start;"><span>${escapeHtml(f.name)}</span></div>`).join('') || '<div>暂无好友</div>';
            return `
                <div class="page">
                    <div class="card"><h3>好友请求</h3>${requestsHtml}</div>
                    <div class="card"><h3>我的好友</h3>${friendsHtml}</div>
                    <div class="card"><h3>添加好友</h3><input id="add-friend-name" placeholder="输入用户名"><button id="search-add">搜索并添加</button></div>
                </div>
                <div class="bottom-menu">
                    <div class="menu-item" data-view="friends"><div class="menu-icon">💬</div><span>聊天</span></div>
                    <div class="menu-item ${currentView === 'contacts' ? 'active' : ''}" data-view="contacts"><div class="menu-icon">👥</div><span>通讯录</span></div>
                    <div class="menu-item" data-view="profile"><div class="menu-icon">😀</div><span>我</span></div>
                </div>
            `;
        }

        // 个人中心页面（我的主页、设置、管理）
        async function renderProfileView() {
            let adminBtn = '';
            if (currentProfile.is_admin) adminBtn = '<button id="go-admin" style="margin-top:8px;">管理面板</button>';
            return `
                <div class="page">
                    <div class="card">
                        <div class="profile-header" style="display:flex; gap:16px; align-items:center;">
                            <div class="avatar" style="width:64px; height:64px; font-size:28px;">${getInitial(currentProfile.display_name)}</div>
                            <div>
                                <div style="font-size:20px; font-weight:600;">${escapeHtml(currentProfile.display_name)}</div>
                                <div>${currentProfile.is_admin ? '管理员' : '普通用户'}</div>
                                ${currentProfile.is_muted ? '<div style="color:red;">⛔ 禁言中</div>' : ''}
                            </div>
                        </div>
                        <div><strong>简介</strong><br>${escapeHtml(currentProfile.bio || '这个人很懒')}</div>
                        <div><strong>加入时间</strong><br>${new Date(currentProfile.created_at).toLocaleDateString()}</div>
                    </div>
                    <div class="card"><h3>更改昵称</h3><input id="new-name" value="${escapeHtml(currentProfile.display_name)}"><button id="update-name">保存</button></div>
                    <div class="card"><h3>修改密码</h3><input type="password" id="old-pwd" placeholder="当前密码"><input type="password" id="new-pwd" placeholder="新密码"><button id="update-pwd">更新密码</button></div>
                    <div class="card"><h3>个人简介</h3><textarea id="bio-text" rows="2">${escapeHtml(currentProfile.bio || '')}</textarea><button id="update-bio">保存简介</button></div>
                    <div class="card"><h3>上传头像</h3><input type="file" id="avatar-file" accept="image/*"><button id="upload-avatar">上传</button></div>

        // 管理页面
        async function renderAdminView() {
            const { data: users } = await _supabase.from('public_profiles').select('*').is('deleted_at', null);
            const { data: ann } = await _supabase.from('announcements').select('content').order('created_at', { ascending: false }).limit(1);

            let tableRows = '';
            for (const u of users) {

                        <div class="table-wrapper"><table><thead><tr><th></th><th>用户名</th><th>管理员</th><th>禁言</th><th>操作</th></tr></thead><tbody>${tableRows}</tbody></table></div>
                    </div>
                    <div class="card"><h3>创建新用户</h3><input id="new-admin-name" placeholder="用户名"><input id="new-admin-pwd" placeholder="密码"><button id="admin-create-user">创建</button></div>
                </div>
                <div class="bottom-menu">
                    <div class="menu-item" data-view="friends">💬 聊天</div>
                    <div class="menu-item" data-view="contacts">👥 通讯录</div>
                    <div class="menu-item" data-view="profile">😀 我</div>
                </div>
            `;
        }

        // 聊天页（全屏）

            let msgsHtml = '';
            if (messages && messages.length) {
                for (const m of messages) {
                    const isSent = (m.from_user_id === currentUser.id);

                }
            } else {
                msgsHtml = '<div style="text-align:center;color:#888;padding:20px;">暂无消息</div>';

        // 切换视图（全屏切换动画）
        async function switchView(view, extra = null) {
            if (view === 'chat' && extra) currentChatUser = extra;
            else if (view !== 'chat') currentChatUser = null;
            currentView = view;
            await renderApp();
        }

        async function renderApp() {
            if (!currentProfile) return;
            let content = '';
            if (currentView === 'friends') content = await renderFriendsView();
            else if (currentView === 'contacts') content = await renderContactsView();
            else if (currentView === 'profile') content = await renderProfileView();
            else if (currentView === 'admin') content = await renderAdminView();
            else if (currentView === 'chat') content = await renderChatView();
            else content = await renderFriendsView();

            document.getElementById('root').innerHTML = content;
            // 绑定事件
            if (currentView === 'friends') {
                document.querySelectorAll('.friend-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const id = el.dataset.id;
                        const name = el.dataset.name;
                        if (id) {
                            // 切换到聊天视图
                            switchView('chat', { id: id, display_name: name });
                            // 清除未读
                            if (unreadCounts.get(id) > 0) {
                                clearUnreadForUser(id).then(() => loadUnreadCounts());
                            }
                        }
                    });
                });
                const menuBtn = document.getElementById('main-menu-btn');
                if (menuBtn) menuBtn.onclick = () => alert('更多功能开发中');
                // 底部菜单
                document.querySelectorAll('.menu-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const view = el.dataset.view;
                        if (view === 'contacts') switchView('contacts');
                        else if (view === 'profile') switchView('profile');
                        else if (view === 'friends') switchView('friends');
                    });
                });
            } else if (currentView === 'contacts') {
                // 接受/拒绝好友请求
                document.querySelectorAll('.accept-friend').forEach(btn => btn.onclick = async function() {
                    const reqId = this.closest('.friend-item').dataset.requestId;
                    await _supabase.from('friendships').update({ status: 'accepted' }).eq('id', reqId);
                    switchView('contacts');
                });
                document.querySelectorAll('.reject-friend').forEach(btn => btn.onclick = async function() {
                    const reqId = this.closest('.friend-item').dataset.requestId;
                    await _supabase.from('friendships').delete().eq('id', reqId);
                    switchView('contacts');
                });
                const searchBtn = document.getElementById('search-add');
                if (searchBtn) searchBtn.onclick = async function() {
                    const username = document.getElementById('add-friend-name').value.trim();
                    if (!username) return;
                    const { data: users } = await _supabase.from('public_profiles').select('id, display_name').ilike('display_name', username).is('deleted_at', null).limit(1);
                    if (!users || users.length === 0) { alert('用户不存在'); return; }
                    const target = users[0];
                    if (target.id === currentUser.id) { alert('不能添加自己'); return; }
                    const { data: existing } = await _supabase.from('friendships').select('status').or(`and(user_id.eq.${currentUser.id},friend_id.eq.${target.id}),and(user_id.eq.${target.id},friend_id.eq.${currentUser.id})`).maybeSingle();
                    if (existing) {
                        if (existing.status === 'accepted') alert('已经是好友');
                        else if (existing.status === 'pending') alert('已发送过好友请求');
                        else alert('无法添加');
                        return;
                    }
                    await _supabase.from('friendships').insert({ user_id: currentUser.id, friend_id: target.id, status: 'pending' });
                    alert('好友申请已发送');
                    switchView('contacts');
                };
                // 底部菜单
                document.querySelectorAll('.menu-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const view = el.dataset.view;
                        if (view === 'friends') switchView('friends');
                        else if (view === 'profile') switchView('profile');
                        else if (view === 'contacts') switchView('contacts');
                    });
                });
            } else if (currentView === 'profile') {
                // 设置功能
                document.getElementById('update-name')?.addEventListener('click', async function() {
                    const newName = document.getElementById('new-name').value.trim();
                    if (!newName) return;
                    await _supabase.from('public_profiles').update({ display_name: newName }).eq('id', currentUser.id);
                    currentProfile.display_name = newName;
                    alert('昵称已更新');
                    switchView('profile');
                });
                document.getElementById('update-pwd')?.addEventListener('click', async function() {
                    const old = document.getElementById('old-pwd').value;
                    const newPwd = document.getElementById('new-pwd').value;
                    if (!old || !newPwd) return;
                    const { error } = await _supabase.auth.updateUser({ password: newPwd });
                    if (error) alert(error.message);
                    else {
                        alert('密码已修改，请重新登录');
                        await _supabase.auth.signOut();
                        currentUser = null;
                        currentProfile = null;
                        if (messagesSubscription) messagesSubscription.unsubscribe();
                        renderRoot();
                    }
                });
                document.getElementById('update-bio')?.addEventListener('click', async function() {
                    const bio = document.getElementById('bio-text').value;
                    await _supabase.from('public_profiles').update({ bio: bio }).eq('id', currentUser.id);
                    currentProfile.bio = bio;
                    alert('简介已更新');
                    switchView('profile');
                });
                document.getElementById('upload-avatar')?.addEventListener('click', async function() {
                    const file = document.getElementById('avatar-file').files[0];
                    if (!file) return;
                    const ext = file.name.split('.').pop();
                    const path = `${currentUser.id}/${Date.now()}.${ext}`;
                    const { error: upErr } = await _supabase.storage.from('avatars').upload(path, file);
                    if (upErr) { alert(upErr.message); return; }
                    const { data: { publicUrl } } = _supabase.storage.from('avatars').getPublicUrl(path);
                    await _supabase.from('public_profiles').update({ avatar_url: publicUrl }).eq('id', currentUser.id);
                    currentProfile.avatar_url = publicUrl;
                    alert('头像已更新');
                    switchView('profile');
                });
                document.getElementById('delete-account')?.addEventListener('click', async function() {
                    if (!confirm('永久删除所有数据？不可恢复！')) return;
                    await _supabase.from('public_profiles').update({ deleted_at: new Date().toISOString() }).eq('id', currentUser.id);
                    await _supabase.auth.signOut();
                    currentUser = null;
                    currentProfile = null;
                    renderRoot();
                });
                const goAdmin = document.getElementById('go-admin');
                if (goAdmin) goAdmin.onclick = () => switchView('admin');
                // 底部菜单
                document.querySelectorAll('.menu-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const view = el.dataset.view;
                        if (view === 'friends') switchView('friends');
                        else if (view === 'contacts') switchView('contacts');
                        else if (view === 'profile') switchView('profile');
                    });
                });
            } else if (currentView === 'admin') {
                // 管理员事件（略简，但保留批量操作）
                document.getElementById('save-announcement')?.addEventListener('click', async function() {
                    const content = document.getElementById('admin-announcement').value;
                    if (!content) return;
                    await _supabase.from('announcements').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                    await _supabase.from('announcements').insert({ content, created_by: currentUser.id });
                    alert('公告已更新');
                    switchView('admin');
                });
                const selectAll = document.getElementById('select-all');
                if (selectAll) selectAll.onchange = e => document.querySelectorAll('.user-checkbox').forEach(cb => cb.checked = e.target.checked);
                function getSelected() { return Array.from(document.querySelectorAll('.user-checkbox:checked')).map(cb => cb.value).filter(id => id !== currentUser.id); }
                document.getElementById('batch-set-admin')?.addEventListener('click', async () => {
                    const ids = getSelected(); if (!ids.length) return alert('请选择用户');
                    for (const id of ids) await _supabase.from('public_profiles').update({ is_admin: true }).eq('id', id);
                    alert('完成'); switchView('admin');
                });
                document.getElementById('batch-remove-admin')?.addEventListener('click', async () => {
                    const ids = getSelected(); if (!ids.length) return alert('请选择用户');
                    for (const id of ids) await _supabase.from('public_profiles').update({ is_admin: false }).eq('id', id);
                    alert('完成'); switchView('admin');
                });
                document.getElementById('batch-mute')?.addEventListener('click', async () => {
                    const ids = getSelected(); if (!ids.length) return alert('请选择用户');
                    for (const id of ids) await _supabase.from('public_profiles').update({ is_muted: true }).eq('id', id);
                    alert('完成'); switchView('admin');
                });
                document.getElementById('batch-unmute')?.addEventListener('click', async () => {
                    const ids = getSelected(); if (!ids.length) return alert('请选择用户');
                    for (const id of ids) await _supabase.from('public_profiles').update({ is_muted: false }).eq('id', id);
                    alert('完成'); switchView('admin');
                });
                document.getElementById('batch-delete')?.addEventListener('click', async () => {
                    const ids = getSelected(); if (!ids.length) return alert('请选择用户');
                    if (confirm(`删除 ${ids.length} 个用户？`)) {
                        for (const id of ids) {
                            await _supabase.from('public_profiles').update({ deleted_at: new Date().toISOString() }).eq('id', id);
                            await _supabase.from('friendships').delete().or(`user_id.eq.${id},friend_id.eq.${id}`);
                        }
                        alert('完成'); switchView('admin');
                    }
                });
                document.querySelectorAll('.set-admin').forEach(btn => btn.onclick = async function() {
                    const userId = this.dataset.id;
                    if (userId === currentUser.id) return alert('不能对自己操作');
                    await _supabase.from('public_profiles').update({ is_admin: true }).eq('id', userId);
                    alert('已设为管理员'); switchView('admin');
                });
                document.querySelectorAll('.toggle-mute').forEach(btn => btn.onclick = async function() {
                    const userId = this.dataset.id;
                    if (userId === currentUser.id) return alert('不能对自己操作');
                    const { data: user } = await _supabase.from('public_profiles').select('is_muted').eq('id', userId).single();
                    await _supabase.from('public_profiles').update({ is_muted: !user.is_muted }).eq('id', userId);
                    alert(!user.is_muted ? '已禁言' : '已解除禁言'); switchView('admin');
                });
                document.querySelectorAll('.admin-del').forEach(btn => btn.onclick = async function() {
                    const userId = this.dataset.id;
                    if (userId === currentUser.id) return alert('不能删除自己');
                    if (!confirm('删除该用户？')) return;
                    await _supabase.from('public_profiles').update({ deleted_at: new Date().toISOString() }).eq('id', userId);
                    await _supabase.from('friendships').delete().or(`user_id.eq.${userId},friend_id.eq.${userId}`);
                    alert('已删除'); switchView('admin');
                });
                document.getElementById('admin-create-user')?.addEventListener('click', async function() {
                    const username = document.getElementById('new-admin-name').value.trim();
                    const pwd = document.getElementById('new-admin-pwd').value;
                    if (!username || !pwd) return alert('请填写');
                    const { data: existing } = await _supabase.from('public_profiles').select('id').eq('display_name', username).is('deleted_at', null).maybeSingle();
                    if (existing) return alert('用户名已存在');
                    const randomEmail = crypto.randomUUID() + EMAIL_SUFFIX;
                    const { data, error } = await _supabase.auth.signUp({ email: randomEmail, password: pwd });
                    if (error) return alert('创建失败: ' + error.message);
                    if (data.user) {
                        await _supabase.from('public_profiles').insert({ id: data.user.id, email: randomEmail, display_name: username, is_admin: false, is_muted: false, bio: '' });
                        alert('创建成功'); switchView('admin');
                    }
                });
                document.querySelectorAll('.menu-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const view = el.dataset.view;
                        if (view === 'friends') switchView('friends');
                        else if (view === 'contacts') switchView('contacts');
                        else if (view === 'profile') switchView('profile');
                    });
                });
            } else if (currentView === 'chat') {
                // 返回按钮
                const backBtn = document.getElementById('chat-back-btn');
                if (backBtn) backBtn.onclick = () => switchView('friends');
                // 发送消息
                const sendBtn = document.getElementById('chat-send');
                const chatInput = document.getElementById('chat-input');
                if (sendBtn && chatInput) {
                    const send = async () => {
                        const content = chatInput.value.trim();
                        if (!content) return;
                        if (currentProfile.is_muted) { alert('你已被禁言'); return; }
                        const { error } = await _supabase.from('messages').insert({
                            from_user_id: currentUser.id,
                            to_user_id: currentChatUser.id,
                            content: content
                        });
                        if (!error) {
                            chatInput.value = '';
                            // 乐观更新显示消息
                            const container = document.getElementById('chat-messages');
                            if (container) {
                                const div = document.createElement('div');
                                div.className = 'message sent';
                                div.innerHTML = `<div class="bubble">${renderMessageContent(content)}</div>`;
                                container.appendChild(div);
                                container.scrollTop = container.scrollHeight;
                            }
                        } else alert('发送失败: ' + error.message);
                    };
                    sendBtn.onclick = send;
                    chatInput.onkeypress = e => { if (e.key === 'Enter') send(); };
                }
                // 表情
                const emojiBtn = document.getElementById('emoji-btn');
                const emojiPicker = document.getElementById('emoji-picker');
                if (emojiBtn && emojiPicker) {
                    emojiBtn.onclick = e => { e.stopPropagation(); emojiPicker.classList.toggle('active'); };
                    document.addEventListener('click', () => emojiPicker.classList.remove('active'));
                    document.querySelectorAll('.emoji-item').forEach(el => el.addEventListener('click', function() {
                        const input = document.getElementById('chat-input');
                        if (input) { input.value += this.innerText; input.focus(); }
                        emojiPicker.classList.remove('active');
                    }));
                }
                // 文件
                const fileBtn = document.getElementById('file-btn');
                const fileInput = document.getElementById('file-input');
                if (fileBtn && fileInput) {
                    fileBtn.onclick = () => fileInput.click();
                    fileInput.onchange = async e => {
                        const file = e.target.files[0];
                        if (file) await sendMessageWithFile(file);
                        fileInput.value = '';
                    };
                }
                // 实时消息订阅
                if (messagesSubscription) messagesSubscription.unsubscribe();
                messagesSubscription = _supabase.channel('new-msg').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `to_user_id=eq.${currentUser.id}` }, async payload => {
                    if (currentChatUser && payload.new.from_user_id === currentChatUser.id) {
                        const container = document.getElementById('chat-messages');
                        if (container) {
                            const div = document.createElement('div');
                            div.className = 'message received';
                            div.innerHTML = `<div class="bubble">${renderMessageContent(payload.new.content)}</div>`;
                            container.appendChild(div);
                            container.scrollTop = container.scrollHeight;
                        }
                        await clearUnreadForUser(payload.new.from_user_id);
                        await loadUnreadCounts();
                    }
                }).subscribe();
            }
        }

        // ========== 认证界面 ==========
        function renderAuth() {
            return `<div class="login-container"><div class="login-card"><h2>JChat</h2><div id="auth-error" class="error-msg"></div><input type="text" id="auth-username" placeholder="用户名"><input type="password" id="auth-password" placeholder="密码"><button id="auth-submit">登录</button><div class="auth-switch" id="auth-switch">没有账号？注册</div></div></div>`;
        }

        let authIsLogin = true;
        function attachAuthEvents() {
            const submit = document.getElementById('auth-submit');
            const switchBtn = document.getElementById('auth-switch');
            const errorDiv = document.getElementById('auth-error');
            async function handleAuth() {
                errorDiv.innerText = '';
                const username = document.getElementById('auth-username').value.trim();
                const password = document.getElementById('auth-password').value;
                if (!username || !password) { errorDiv.innerText = '请填写用户名和密码'; return; }
                const originalText = submit.innerText;
                submit.disabled = true;
                submit.innerText = authIsLogin ? '登录中...' : '注册中...';
                try {
                    if (authIsLogin) {
                        const { data: profile } = await _supabase.from('public_profiles').select('email').eq('display_name', username).maybeSingle();
                        if (!profile) throw new Error('用户名不存在');
                        const { error } = await _supabase.auth.signInWithPassword({ email: profile.email, password: password });
                        if (error) throw new Error(error.message);
                        const { data: { user } } = await _supabase.auth.getUser();
                        currentUser = user;
                        await ensureProfile(currentUser, username);
                        currentProfile = await fetchCurrentProfile();
                        await loadUnreadCounts();
                        switchView('friends');
                    } else {
                        const { data: existing } = await _supabase.from('public_profiles').select('id').eq('display_name', username).is('deleted_at', null).maybeSingle();
                        if (existing) throw new Error('用户名已被占用');
                        const randomEmail = crypto.randomUUID() + EMAIL_SUFFIX;
                        const { data, error } = await _supabase.auth.signUp({ email: randomEmail, password: password });
                        if (error) throw new Error(error.message);
                        if (data.user) {
                            currentUser = data.user;
                            await ensureProfile(currentUser, username);
                            currentProfile = await fetchCurrentProfile();
                            await loadUnreadCounts();
                            switchView('friends');
                        } else throw new Error('注册失败');
                    }
                } catch (err) { errorDiv.innerText = err.message; }
                finally { submit.disabled = false; submit.innerText = originalText; }
            }
            submit.onclick = handleAuth;
            switchBtn.onclick = function() {
                authIsLogin = !authIsLogin;
                submit.innerText = authIsLogin ? '登录' : '注册';
                switchBtn.innerText = authIsLogin ? '没有账号？注册' : '已有账号？登录';
                errorDiv.innerText = '';
            };
        }

        async function renderRoot() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session && session.user) {
                currentUser = session.user;
                try {
                    currentProfile = await fetchCurrentProfile();
                    await loadUnreadCounts();
                    await switchView('friends');
                } catch (err) { console.error(err); document.getElementById('root').innerHTML = '<div style="text-align:center;padding:40px;">加载失败，请刷新页面或重新登录</div>'; }
            } else {
                document.getElementById('root').innerHTML = renderAuth();
                attachAuthEvents();
            }
        }
        renderRoot();
    })();
</script>
</body>
</html>
